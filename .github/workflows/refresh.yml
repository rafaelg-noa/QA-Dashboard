name: refresh-data

# Regenerates public/data.json from the live sources on a schedule and commits it.
# Cloudflare Pages watches main and redeploys when data.json changes.
on:
  schedule:
    - cron: "0 */6 * * *" # every 6h (UTC). NOTE: each run does a ~12-15 min PMA pull;
                          # 4 runs/day ≈ ~1800 of the 2000 free private-repo Actions min/month.
                          # Dial to "0 */12 * * *" (and set refreshIntervalHours to 12 in
                          # generator/index.js) if you want more headroom.
  workflow_dispatch: {} # manual "Run workflow" button

permissions:
  contents: write # to commit the refreshed data.json

concurrency:
  group: refresh-data
  cancel-in-progress: false # never interrupt a half-written snapshot

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      # Unit gate — if the generator logic is red, do NOT ship a snapshot.
      - run: npm test

      # Generate. On schema-invalid or fetch failure, generator/index.js exits non-zero
      # WITHOUT writing — the last committed data.json survives (spec §4).
      - name: Generate snapshot
        env:
          BASEROW_TOKEN: ${{ secrets.BASEROW_TOKEN }}
          PMA_API_TOKEN: ${{ secrets.PMA_API_TOKEN }}
        run: npm run build

      - name: Commit data.json if it changed
        run: |
          if git diff --quiet -- public/data.json; then
            echo "No data change — skipping commit."
          else
            git config user.name "rafaelg-noa"
            git config user.email "rafaelg-noa@users.noreply.github.com"
            git add public/data.json
            git commit -m "data: scheduled snapshot refresh"
            git push
          fi
